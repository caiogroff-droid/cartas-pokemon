<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokémon Tracker</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
    <script src="https://unpkg.com/htmx.org@2.0.7"></script>
  </head>
  <body>
    <div class="app-wrapper">
      <!-- HEADER -->
      <header class="app-header">
        <div class="header-brand">
          <span class="header-eyebrow">Card Collection</span>
          <h1 class="header-title">Pokémon <span>Tracker</span></h1>
        </div>
      </header>

      <!-- SEARCH -->
      <div class="search-container">
        <div class="search-wrapper">
          <svg
            class="search-icon"
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <input
            class="search-input"
            type="text"
            id="search"
            name="search"
            placeholder="Buscar carta pelo nome..."
            autocomplete="off"
            hx-get="/search"
            hx-trigger="keyup changed delay:300ms"
            hx-target="#cards-table"
            hx-swap="innerHTML"
            hx-indicator="#cards-table"
          />
        </div>
        <button
          class="reset-wrapper"
          hx-get="/reset"
          hx-target="body"
          hx-swap="innerHTML"
          hx-indicator="#cards-table"
        >
          <svg
            class="search-icon"
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 2v6h-6"></path>
            <path d="M3 12A9 9 0 0 1 18.13 5.36L21 8"></path>
            <path d="M3 22v-6h6"></path>
            <path d="M21 12a9 9 0 0 1-15.13 6.64L3 16"></path>
          </svg>
          <p>Reset Filters</p>
        </button>
        <div style="flex: 1"></div>

        <div class="filter-container">
          <input
            type="checkbox"
            class="fav-toggle"
            id="owned"
            name="owned"
            title="Filtrar por coletados"
            hx-post="/change-filter"
            hx-trigger="change"
            hx-target="#cards-table"
            hx-swap="innerHTML"
            hx-indicator="#cards-table"
          />

          <p>Mostrar apenas os coletados</p>
        </div>

        {% if tableScreen %}
        <button
          class="button-ball"
          title="Adicionar carta"
          hx-get="/add-card"
          hx-target=".app-wrapper"
          onclick="setActive(this)"
        ></button>
        {% else %}
        <button
          class="pokedex-icon"
          title="Voltar para tabela"
          hx-get="/"
          hx-target=".app-wrapper"
        ></button>
        {% endif %}
      </div>
      <!-- TABLE -->
      <div class="table-container">
        <div id="cards-table">{% include "partials/card_table.html" %}</div>
      </div>
    </div>
    <script>
      tableScreen = true;

      function setActive(btn) {
        document
          .querySelectorAll("nav#topbar button")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
      }

      function getSearch() {
        return document.querySelector(".search-input").value;
      }
    </script>
  </body>
</html>
